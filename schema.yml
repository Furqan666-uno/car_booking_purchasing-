components:
  schemas:
    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          readOnly: true
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        pickup_date:
          type: string
          format: date
        return_date:
          type: string
          format: date
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        car:
          type: string
          format: uuid
      required:
      - car
      - created_at
      - id
      - pickup_date
      - price
      - return_date
      - status
      - user
    Car:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        owner:
          type: string
          readOnly: true
        car_model:
          type: string
          maxLength: 50
        brand:
          type: string
          maxLength: 50
        release_year:
          type: integer
          maximum: 2147483647
          minimum: 0
        fuel_type:
          $ref: '#/components/schemas/FuelTypeEnum'
        transmission_type:
          $ref: '#/components/schemas/TransmissionTypeEnum'
        seats:
          type: integer
          maximum: 2147483647
          minimum: 0
        listing_type:
          $ref: '#/components/schemas/ListingTypeEnum'
        renting_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        selling_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        available_for_rent:
          type: boolean
        available_for_sale:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        is_available:
          type: boolean
      required:
      - brand
      - car_model
      - created_at
      - fuel_type
      - id
      - owner
      - release_year
      - seats
      - transmission_type
    CarImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        image:
          type: string
          format: uri
        uploaded_at:
          type: string
          format: date-time
          readOnly: true
        car:
          type: string
          format: uuid
      required:
      - car
      - id
      - image
      - uploaded_at
    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        seller:
          type: string
          readOnly: true
        buyer:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        car:
          type: string
          format: uuid
      required:
      - buyer
